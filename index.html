<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>SoulRift - Server Minecraft Survival & Lifesteal Indonesia</title>

    <link rel="icon" type="image/png" href="/favicon.png" />

    <meta name="description" content="SoulRift adalah server Minecraft Indonesia dengan mode Survival dan Lifesteal. Bergabung bersama komunitas aktif, event menarik, dan gameplay seru." />
    <meta name="keywords" content="SoulRift, server minecraft indonesia, minecraft survival indonesia, minecraft lifesteal, discord minecraft" />
    <meta name="author" content="SoulRift" />

    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://discord.soulrift.site/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="SoulRift" />
    <meta property="og:title" content="SoulRift - Minecraft Survival & Lifesteal Indonesia" />
    <meta property="og:description" content="Gabung ke SoulRift, server Minecraft Indonesia dengan Survival, Lifesteal, event, dan komunitas aktif." />
    <meta property="og:url" content="https://discord.soulrift.site/" />
    <meta property="og:image" content="https://discord.soulrift.site/banner.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SoulRift - Minecraft Survival & Lifesteal Indonesia" />
    <meta name="twitter:description" content="Gabung ke SoulRift Minecraft Server Indonesia." />
    <meta name="twitter:image" content="https://discord.soulrift.site/banner.png" />

    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <style>
        :root {
            --bg: #030308;
            --purple: #b44dff;
            --purple-soft: rgba(180, 77, 255, 0.3);
            --purple-glow: rgba(180, 77, 255, 0.5);
            --text: #f0e6ff;
            --text-secondary: #b0b0c8;
            --accent: #c084fc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            /* Hanya satu aksen ambient sangat tipis, tidak bergerak */
            background-image: radial-gradient(ellipse at 50% 40%, rgba(139, 92, 246, 0.04) 0%, transparent 60%);
            background-attachment: fixed;
        }

        /* Partikel bintang sangat minimal dan tidak animasi */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background-image:
                radial-gradient(1px 1px at 15% 30%, rgba(200, 160, 255, 0.25), transparent),
                radial-gradient(1px 1px at 70% 55%, rgba(190, 140, 255, 0.2), transparent),
                radial-gradient(1px 1px at 35% 75%, rgba(210, 165, 255, 0.2), transparent),
                radial-gradient(1px 1px at 85% 20%, rgba(185, 140, 255, 0.2), transparent);
            opacity: 0.8;
        }

        .main-content {
            position: relative;
            z-index: 1;
            max-width: 680px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding: 10px 10px;
        }

        /* === BANNER === */
        .banner-wrapper {
            width: 100%;
            max-width: 500px;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            border: 1.5px solid rgba(180, 77, 255, 0.45);
            box-shadow: 0 0 20px rgba(180, 77, 255, 0.15), 0 6px 18px rgba(0, 0, 0, 0.6);
            transition: box-shadow 0.3s ease, border-color 0.3s ease;
            line-height: 0;
            background: #0a0818;
        }

        .banner-wrapper:hover {
            border-color: rgba(200, 130, 255, 0.65);
            box-shadow: 0 0 30px rgba(180, 77, 255, 0.25), 0 8px 24px rgba(0, 0, 0, 0.7);
        }

        .banner-wrapper::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            box-shadow: inset 0 0 25px rgba(180, 77, 255, 0.15);
            border-radius: 10px;
        }

        .banner-img {
            display: block;
            width: 100%;
            height: auto;
            object-fit: cover;
            aspect-ratio: 16 / 6;
            background: #0a0818;
            transition: filter 0.3s;
        }

        .banner-wrapper:hover .banner-img {
            filter: brightness(1.05) saturate(1.1);
        }

        .banner-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            aspect-ratio: 16 / 6;
            background: linear-gradient(135deg, #0b0818, #110e24, #0b0818);
            position: relative;
            overflow: hidden;
        }

        .banner-placeholder::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 30% 50%, rgba(180, 77, 255, 0.12), transparent);
        }

        .banner-placeholder-text {
            position: relative;
            font-weight: 700;
            font-size: 1.6rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #d4b8ff;
            text-shadow: 0 0 12px rgba(180, 77, 255, 0.5);
        }

        .banner-label {
            position: absolute;
            bottom: 8px;
            right: 12px;
            z-index: 3;
            font-size: 0.6rem;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: rgba(220, 200, 240, 0.7);
            background: rgba(0, 0, 0, 0.5);
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid rgba(180, 77, 255, 0.25);
            backdrop-filter: blur(3px);
        }

        /* === JUDUL === */
        h1 {
            font-size: 2.7rem;
            font-weight: 800;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: #e8d5ff;
            margin: 0;
            line-height: 1.2;
            text-shadow: 0 0 12px rgba(180, 77, 255, 0.35), 0 0 30px rgba(139, 92, 246, 0.15);
        }

        h1 i {
            font-size: 2rem;
            margin: 0 6px;
            vertical-align: middle;
            color: #c084fc;
            filter: drop-shadow(0 0 8px rgba(180, 77, 255, 0.5));
            transition: transform 0.3s ease;
        }

        .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--purple), transparent);
            border-radius: 2px;
            opacity: 0.8;
            box-shadow: 0 0 10px var(--purple-soft);
        }

        /* Deskripsi */
        p.desc {
            font-size: 1.1rem;
            line-height: 1.7;
            color: #c8bfe0;
            max-width: 500px;
            margin: 0;
        }

        b {
            color: #ddc3ff;
            font-weight: 700;
            text-shadow: 0 0 6px rgba(180, 130, 255, 0.25);
        }

        /* Tombol Discord */
        .discord-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #7c3aed;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 700;
            text-decoration: none;
            padding: 14px 38px;
            border-radius: 50px;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: 1px solid rgba(200, 160, 255, 0.5);
            box-shadow: 0 0 18px rgba(180, 77, 255, 0.3), 0 6px 18px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .discord-btn i {
            font-size: 1.4rem;
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.4));
            transition: transform 0.3s;
        }

        .discord-btn:hover {
            background: #8b5cf6;
            border-color: rgba(220, 190, 255, 0.8);
            box-shadow: 0 0 28px rgba(180, 77, 255, 0.5), 0 8px 22px rgba(0, 0, 0, 0.6);
            transform: translateY(-2px);
        }

        .discord-btn:hover i {
            transform: scale(1.1);
        }

        .discord-btn:active {
            transform: translateY(0);
            transition: transform 0.1s;
        }

        /* Fallback */
        .fallback-text {
            font-size: 0.8rem;
            color: #7a7a9a;
            margin-top: 4px;
        }

        .fallback-text a {
            color: #b98aff;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .fallback-text a:hover {
            color: #d4b8ff;
            text-decoration: underline;
            text-underline-offset: 3px;
            text-decoration-color: rgba(180, 130, 255, 0.4);
        }

        /* Responsive */
        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
                letter-spacing: 3px;
            }
            h1 i {
                font-size: 1.4rem;
            }
            .discord-btn {
                font-size: 1rem;
                padding: 12px 28px;
            }
            p.desc {
                font-size: 1rem;
            }
        }
    </style>
</head>

<body>
    <div class="main-content">
        <!-- Banner Server -->
        <div class="banner-wrapper">
            <img
                class="banner-img"
                src="https://discord.soulrift.site/banner.png"
                alt="Banner SoulRift"
                loading="lazy"
                onerror="this.style.display='none'; this.parentElement.querySelector('.banner-placeholder').style.display='flex';"
            />
            <div class="banner-placeholder" style="display: none;">
                <span class="banner-placeholder-text">SoulRift</span>
                <span class="banner-label">Server</span>
            </div>
            <span class="banner-label" id="bannerLabelImg">Minecraft</span>
        </div>

        <h1>
            <i class="fa-solid fa-skull"></i> SoulRift <i class="fa-solid fa-skull"></i>
        </h1>
        <div class="divider"></div>

        <p class="desc">
            Server Minecraft Indonesia dengan mode
            <b>Survival</b> dan <b>Lifesteal</b>.<br />
            Suasana magis, event kompetitif, dan komunitas aktif.
        </p>

        <a href="https://discord.gg/YzXw3HNXw" class="discord-btn" rel="noopener noreferrer">
            <i class="fa-brands fa-discord"></i> Join Discord
        </a>

        <p class="fallback-text">
            Link tidak terbuka otomatis?<br />
            <a href="https://discord.gg/YzXw3HNXw">Klik di sini untuk bergabung ke Discord</a>.
        </p>
    </div>

    <script>
        const bannerImg = document.querySelector('.banner-img');
        const bannerLabelImg = document.getElementById('bannerLabelImg');
        const bannerPlaceholder = document.querySelector('.banner-placeholder');

        if (bannerImg && bannerImg.complete && bannerImg.naturalWidth === 0) {
            bannerImg.style.display = 'none';
            if (bannerPlaceholder) bannerPlaceholder.style.display = 'flex';
            if (bannerLabelImg) bannerLabelImg.style.display = 'none';
        }

        bannerImg?.addEventListener('load', function () {
            if (bannerPlaceholder) bannerPlaceholder.style.display = 'none';
            if (bannerLabelImg) bannerLabelImg.style.display = 'block';
            this.style.display = 'block';
        });

        bannerImg?.addEventListener('error', function () {
            this.style.display = 'none';
            if (bannerPlaceholder) bannerPlaceholder.style.display = 'flex';
            if (bannerLabelImg) bannerLabelImg.style.display = 'none';
        });
    </script>
</body>
</html>
